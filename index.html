<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 点击破裂的泡泡天空 v0.2</title>
<style>
  /* ========== 基础重置 ========== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    width: 100%;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ========== 天空背景 ========== */
  .sky-bg {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(175deg, #a0d8ef 0%, #4facfe 30%, #00c6fb 70%, #005bea 100%);
    position: relative;
    overflow: hidden;
  }

  /* 云朵装饰 */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: cloudDrift var(--cloud-speed) linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width:120px; height:50px; top:8%; --cloud-speed:35s; }
  .cloud-1::before { width:60px; height:60px; top:-30px; left:20px; }
  .cloud-1::after  { width:80px; height:50px; top:-20px; left:55px; }
  .cloud-2 { width:100px; height:40px; top:15%; --cloud-speed:45s; }
  .cloud-2::before { width:50px; height:50px; top:-25px; left:15px; }
  .cloud-2::after  { width:65px; height:40px; top:-15px; left:45px; }

  @keyframes cloudDrift {
    from { left: -200px; }
    to   { left: 110vw; }
  }

  /* ========== 泡泡 ========== */
  .bubble {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    will-change: transform;
    transition: filter 0.15s;
    /* GPU 加速定位 — JS 中通过 transform 控制 */
  }

  /* 泡泡内发光层 */
  .bubble-inner {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(
      circle at 30% 25%,
      rgba(255,255,255,0.7) 0%,
      rgba(255,255,255,0.15) 40%,
      rgba(255,255,255,0.05) 100%
    );
    pointer-events: none;
  }

  /* 高光点 */
  .bubble-highlight {
    position: absolute;
    width: 25%;
    height: 35%;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    top: 12%;
    left: 25%;
    transform: rotate(-30deg);
    pointer-events: none;
  }

  .bubble:hover {
    filter: brightness(1.15);
  }

  /* ========== 破裂粒子 ========== */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    animation: particleBurst 0.7s ease-out forwards;
  }

  @keyframes particleBurst {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* ========== 波纹 ========== */
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    pointer-events: none;
    will-change: transform, opacity;
    animation: rippleOut 0.6s ease-out forwards;
  }

  @keyframes rippleOut {
    0%   { transform: scale(0.3); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* ========== 得分 ========== */
  .scoreboard {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 10;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    text-align: right;
    pointer-events: none;
  }
  .score-label {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    opacity: 0.8;
  }
  .score-value {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
  }

  /* ========== 连击文字 ========== */
  .combo-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    color: #fff;
    text-shadow: 0 4px 15px rgba(0,0,0,0.2);
    pointer-events: none;
    z-index: 20;
    animation: comboFly 1.2s ease-out forwards;
    opacity: 0;
  }

  @keyframes comboFly {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
  }

  /* ========== 提示文字 ========== */
  .hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.65);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 5;
    animation: hintPulse 2.5s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 0.9; }
  }
</style>
</head>
<body>

<div class="sky-bg" id="sky">
  <!-- 装饰云 -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
</div>

<!-- 得分板 -->
<div class="scoreboard">
  <div class="score-label">💥 POPS</div>
  <div class="score-value" id="score">0</div>
</div>

<!-- 提示 -->
<div class="hint">🫧 点击泡泡戳破它！</div>

<script>
(function() {
  'use strict';

  const sky = document.getElementById('sky');
  const scoreEl = document.getElementById('score');

  // ========== 配置 ==========
  const CONFIG = {
    BUBBLE_COUNT: 15,          // 泡泡总数
    RESPAWN_MIN: 2000,         // 最小重生延迟 (ms)
    RESPAWN_MAX: 4000,         // 最大重生延迟 (ms)
    SIZE_MIN: 30,              // 最小尺寸 (px)
    SIZE_MAX: 80,              // 最大尺寸 (px)
    DRIFT_AMPLITUDE: 50,       // 左右摆动幅度 (px)
    SPEED_MIN: 0.15,           // 最小上升速度
    SPEED_MAX: 0.5,            // 最大上升速度
    PARTICLE_COUNT: 10,        // 破裂粒子数量
  };

  // ========== 状态 ==========
  let score = 0;
  let comboCount = 0;
  let comboTimer = null;
  const COMBO_WINDOW = 800;    // 连击窗口 (ms)

  // ========== 泡泡色彩方案 ==========
  const BUBBLE_COLORS = [
    { bg: 'rgba(255,255,255,0.18)', border: 'rgba(255,255,255,0.55)' },
    { bg: 'rgba(200,230,255,0.22)', border: 'rgba(200,230,255,0.55)' },
    { bg: 'rgba(255,220,240,0.20)', border: 'rgba(255,220,240,0.50)' },
    { bg: 'rgba(220,255,230,0.18)', border: 'rgba(220,255,230,0.50)' },
    { bg: 'rgba(255,240,210,0.22)', border: 'rgba(255,240,210,0.55)' },
    { bg: 'rgba(230,210,255,0.20)', border: 'rgba(230,210,255,0.50)' },
  ];

  // ========== 工具函数 ==========
  function random(min, max) {
    return min + Math.random() * (max - min);
  }

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ========== 更新得分 ==========
  function addScore(n) {
    score += n;
    scoreEl.textContent = score;
    // 数字弹跳动画
    scoreEl.style.transform = 'scale(1.3)';
    requestAnimationFrame(() => {
      scoreEl.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
      scoreEl.style.transform = 'scale(1)';
    });
  }

  // ========== 连击系统 ==========
  function triggerCombo() {
    comboCount++;
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { comboCount = 0; }, COMBO_WINDOW);

    if (comboCount >= 4) {
      showComboText(`🔥 ${comboCount} 连击！`, '#ff6b6b');
      addScore(comboCount); // 连击加分
    } else if (comboCount >= 2) {
      showComboText(`${comboCount}x`, '#feca57');
    }
  }

  function showComboText(text, color) {
    const el = document.createElement('div');
    el.className = 'combo-text';
    el.textContent = text;
    el.style.color = color;
    sky.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // ========== 粒子爆炸 ==========
  function spawnParticles(x, y, color) {
    const fragment = document.createDocumentFragment();
    const count = CONFIG.PARTICLE_COUNT + Math.floor(Math.random() * 6);

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = random(4, 12);
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left   = x + 'px';
      p.style.top    = y + 'px';
      p.style.background = color;
      p.style.setProperty('--dx', random(-60, 60) + 'px');
      p.style.setProperty('--dy', random(-60, 60) + 'px');
      p.style.animationDuration = random(0.4, 0.8) + 's';
      fragment.appendChild(p);
    }

    sky.appendChild(fragment);

    // 动画结束后清理
    const lastParticle = sky.querySelector('.particle:last-child');
    if (lastParticle) {
      lastParticle.addEventListener('animationend', () => {
        sky.querySelectorAll('.particle').forEach(el => el.remove());
      }, { once: true });
    }
  }

  // ========== 波纹 ==========
  function spawnRipple(x, y, size) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left   = (x - size / 2) + 'px';
    ripple.style.top    = (y - size / 2) + 'px';
    ripple.style.width  = size + 'px';
    ripple.style.height = size + 'px';
    sky.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  // ========== 创建泡泡 ==========
  function createBubble(isInitial = false) {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');

    // --- 尺寸 ---
    const size = random(CONFIG.SIZE_MIN, CONFIG.SIZE_MAX);
    bubble.style.width  = size + 'px';
    bubble.style.height = size + 'px';

    // --- 颜色方案 ---
    const colorScheme = pick(BUBBLE_COLORS);
    bubble.style.background = colorScheme.bg;
    bubble.style.border = `1px solid ${colorScheme.border}`;
    bubble.style.boxShadow = `
      inset 8px 8px 16px rgba(255,255,255,0.45),
      inset -4px -4px 8px rgba(255,255,255,0.1),
      0 2px 8px rgba(0,0,0,0.06)
    `;

    // 内部高光层
    const inner = document.createElement('div');
    inner.className = 'bubble-inner';
    bubble.appendChild(inner);

    const highlight = document.createElement('div');
    highlight.className = 'bubble-highlight';
    bubble.appendChild(highlight);

    // --- 初始位置 ---
    const startX = random(0, window.innerWidth - size);
    const startY = isInitial
      ? random(0, window.innerHeight * 0.8)
      : window.innerHeight + size + random(0, 80);

    // --- 运动参数 ---
    const speedY = random(CONFIG.SPEED_MIN, CONFIG.SPEED_MAX);
    let posX = startX;
    let posY = startY;
    let driftPhase = random(0, Math.PI * 2);
    const driftFreq = random(0.015, 0.04);
    const driftAmp = random(20, CONFIG.DRIFT_AMPLITUDE);

    // 使用 transform 替代 top/left — GPU 加速
    bubble.style.transform = `translate(${posX}px, ${posY}px)`;
    bubble.style.top = '0';
    bubble.style.left = '0';

    sky.appendChild(bubble);

    // --- 动画循环 ---
    let animId;
    function animate() {
      posY -= speedY;
      driftPhase += driftFreq;
      posX = startX + Math.sin(driftPhase) * driftAmp;

      // 超出顶部 → 从底部重新进入
      if (posY < -(size + 20)) {
        posY = window.innerHeight + size + random(0, 60);
      }

      bubble.style.transform = `translate(${posX}px, ${posY}px)`;
      animId = requestAnimationFrame(animate);
    }
    animId = requestAnimationFrame(animate);

    // --- 点击破裂 ---
    function pop(e) {
      e.stopPropagation();

      // 停止动画
      cancelAnimationFrame(animId);

      // 获取当前实际位置
      const rect = bubble.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      // 特效
      spawnParticles(cx, cy, colorScheme.border);
      spawnRipple(cx, cy, size * 1.5);

      // 计分
      triggerCombo();
      addScore(1);

      // 移除泡泡
      bubble.remove();

      // 随机延迟后重生
      const delay = random(CONFIG.RESPAWN_MIN, CONFIG.RESPAWN_MAX);
      setTimeout(() => createBubble(false), delay);
    }

    bubble.addEventListener('pointerdown', pop);
  }

  // ========== 窗口大小变化时重置泡泡 ==========
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      // 清除现有泡泡
      sky.querySelectorAll('.bubble').forEach(b => b.remove());
      // 重新生成（全按初始分布）
      for (let i = 0; i < CONFIG.BUBBLE_COUNT; i++) {
        createBubble(true);
      }
    }, 300);
  });

  // ========== 启动 ==========
  for (let i = 0; i < CONFIG.BUBBLE_COUNT; i++) {
    createBubble(true);
  }
})();
</script>

</body>
</html>
